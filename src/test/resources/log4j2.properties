status = info
dest = err
name = PropertiesConfig

#propertiesCopy code se agrega
propertiesCopy=code
rootLogger.level = info
rootLogger.appenderRefs = STDOUT
rootLogger.appenderRef.stdout.ref = STDOUT

#Define a console appender
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SS} %c{1}:%L - %m%n

#Define a file appender
#appender.file.type = File
#appender.file.name = FILE
#appender.file.fileName = logs/application.log
#appender.file.layout.type = PatternLayout
#appender.file.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SS} %c{1}:%L - %m%n
##Si se desea que el archivo se sobrescriba cada vez que se ejecute la aplicaci¾n, se puede establecer el siguiente parßmetro en false
#appender.file.append = false
#appender.console.filter.threshold.type = ThresholdFilter
#appender.console.filter.threshold.level = error

#Configure a logger for the application
logger.app.name = com.qa
logger.app.level = debug
logger.app.additivity = false
logger.app.appenderRef.console.ref = STDOUT
logger.app.appenderRef.file.ref = ROLLINGFILE

appender.rolling.type = RollingFile
appender.rolling.name = ROLLINGFILE
appender.rolling.fileName = logs/application.log
appender.rolling.filePattern = logs/$${date:yyyy-MM-dd}/application-%d{yyyy-MM-dd}-%i.log
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SS} %c{1}:%L - %m%n
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 1KB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 10
appender.rolling.createOnDemand = true



